name: Tests

on:
  workflow_call:
  pull_request:
    branches: ['master']

jobs:
  test-backend:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - run: corepack enable

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'yarn'

      - run: yarn install

      - name: Run backend tests (Jest)
        run: yarn test:backend

  test-frontend:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - run: corepack enable

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'yarn'

      - run: yarn install

      - name: Run frontend tests (Vitest)
        run: yarn test:frontend
