name: Deploy

on:
  push:
    branches: ['master']

env:
  REGISTRY: registry.hub.docker.com
  IMAGE_PREFIX: pyromatic/spotify-clone-

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      media: ${{ steps.filter.outputs.media }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'apps/backend/**'
            frontend:
              - 'apps/frontend/**'
            media:
              - 'apps/media/**'

  build-frontend:
    needs: changes
    if: ${{ needs.changes.outputs.frontend == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/frontend.Dockerfile
          push: true
          tags: ${{ env.IMAGE_PREFIX }}frontend:latest

  build-backend:
    needs: changes
    if: ${{ needs.changes.outputs.backend == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/backend.Dockerfile
          push: true
          tags: ${{ env.IMAGE_PREFIX }}backend:latest

  build-media:
    needs: changes
    if: ${{ needs.changes.outputs.media == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/media.Dockerfile
          push: true
          tags: ${{ env.IMAGE_PREFIX }}media:latest

  deploy:
    needs: [changes, build-frontend, build-backend, build-media]
    if: always() && (needs.build-frontend.result == 'success' || needs.build-backend.result == 'success' || needs.build-media.result == 'success')
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        env:
          DEPLOY_FRONTEND: ${{ needs.build-frontend.result == 'success' }}
          DEPLOY_BACKEND: ${{ needs.build-backend.result == 'success' }}
          DEPLOY_MEDIA: ${{ needs.build-media.result == 'success' }}
          REGISTRY: ${{ env.REGISTRY }}
          IMAGE_PREFIX: ${{ env.IMAGE_PREFIX }}
          DOCKER_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKERHUB_TOKEN }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_PRIVATE_KEY }}
          envs: DEPLOY_FRONTEND,DEPLOY_BACKEND,DEPLOY_MEDIA,REGISTRY,IMAGE_PREFIX,DOCKER_USERNAME,DOCKER_PASSWORD
          script: |
            docker login $REGISTRY -u $DOCKER_USERNAME -p $DOCKER_PASSWORD
            if [ "$DEPLOY_FRONTEND" = "true" ]; then
              docker service update --image ${IMAGE_PREFIX}frontend:latest --force projects_spotify-clone-frontend
            fi
            if [ "$DEPLOY_BACKEND" = "true" ]; then
              docker service update --image ${IMAGE_PREFIX}backend:latest --force projects_spotify-clone-backend
            fi
            if [ "$DEPLOY_MEDIA" = "true" ]; then
              docker service update --image ${IMAGE_PREFIX}media:latest --force projects_spotify-clone-media
            fi
